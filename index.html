<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НейроNova — Зарабатывай на нейросетях</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    .neon-cyan { text-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff; }
    .neon-purple { text-shadow: 0 0 10px #c300ff, 0 0 20px #c300ff; }
    .star-bg { background: radial-gradient(circle at 50% 50%, #0a0a2a 0%, #000000 70%); }
    .particle { position: absolute; background: #00f7ff; border-radius: 50%; animation: float 25s linear infinite; opacity: 0.3; }
    @keyframes float { from { transform: translateY(100vh) rotate(0deg); } to { transform: translateY(-100vh) rotate(360deg); } }
  </style>
</head>
<body class="bg-black text-white star-bg overflow-x-hidden">

  <!-- NAV -->
  <nav class="fixed top-0 w-full z-50 border-b border-cyan-500/20 bg-black/80 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-xl flex items-center justify-center text-2xl">🌌</div>
        <h1 class="title-font text-3xl neon-cyan tracking-tighter">НейроNova</h1>
      </div>
      <div class="hidden md:flex items-center gap-8 text-lg">
        <a href="index.html" class="hover:text-cyan-400 transition">Главная</a>
        <a href="blog.html" class="hover:text-cyan-400 transition">Блог</a>
        <a href="courses.html" class="hover:text-cyan-400 transition">Курсы</a>
        <a href="cases.html" class="hover:text-cyan-400 transition">Кейсы</a>
        <a href="tools.html" class="hover:text-cyan-400 transition">Инструменты</a>
        <a href="community.html" class="hover:text-cyan-400 transition">Сообщество</a>
      </div>
      <button onclick="alert('Вход в кабине НейроNova')" class="px-6 py-2.5 border border-cyan-400 text-cyan-400 rounded-2xl hover:bg-cyan-400 hover:text-black transition font-medium">Войти</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="min-h-screen pt-24 flex items-center relative">
    <div class="absolute inset-0 bg-[radial-gradient(at_center,#00f7ff10_0%,transparent_70%)]"></div>
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div class="space-y-8">
        <h2 class="text-6xl md:text-7xl title-font leading-none neon-cyan">ЗАРАБАТЫВАЙ<br>НА НЕЙРОСЕТЯХ</h2>
        <p class="text-2xl text-gray-300">От новичка до <span class="text-cyan-400 font-bold">500 000 ₽/мес</span><br>Гайды • Кейсы • Живые инструменты</p>
        <div class="flex flex-wrap gap-4">
          <a href="courses.html" class="px-10 py-6 bg-gradient-to-r from-cyan-400 to-purple-500 text-black text-2xl font-bold rounded-3xl hover:scale-105 transition">НАЧАТЬ БЕСПЛАТНО</a>
          <a href="blog.html" class="px-8 py-6 border-2 border-white/60 text-xl rounded-3xl hover:bg-white/10 transition">Смотреть гайды</a>
        </div>
      </div>
      <div class="relative">
        <div class="bg-gradient-to-br from-cyan-500/10 to-purple-500/10 border border-cyan-400/30 rounded-3xl p-8 backdrop-blur-3xl">
          <img src="https://picsum.photos/id/1015/800/600" alt="hero" class="rounded-2xl shadow-2xl w-full">
        </div>
      </div>
    </div>
    <div id="particles"></div>
  </section>

  <!-- CARDS -->
  <section class="max-w-7xl mx-auto px-6 py-20">
    <div class="grid md:grid-cols-4 gap-6">
      <a href="blog.html" class="group bg-zinc-950 border border-cyan-400/30 hover:border-cyan-400 rounded-3xl p-8 transition-all hover:-translate-y-2 text-center">📝<br><span class="text-2xl font-bold mt-4 block">Блог</span></a>
      <a href="courses.html" class="group bg-zinc-950 border border-purple-400/30 hover:border-purple-400 rounded-3xl p-8 transition-all hover:-translate-y-2 text-center">🚀<br><span class="text-2xl font-bold mt-4 block">Курсы</span></a>
      <a href="cases.html" class="group bg-zinc-950 border border-pink-400/30 hover:border-pink-400 rounded-3xl p-8 transition-all hover:-translate-y-2 text-center">🏆<br><span class="text-2xl font-bold mt-4 block">Кейсы</span></a>
      <a href="tools.html" class="group bg-zinc-950 border border-emerald-400/30 hover:border-emerald-400 rounded-3xl p-8 transition-all hover:-translate-y-2 text-center">🛠️<br><span class="text-2xl font-bold mt-4 block">Инструменты</span></a>
    </div>
  </section>

  <footer class="bg-black border-t border-white/10 py-16 text-center text-gray-400">
    © 2026 НейроNova • Космос твоих доходов
  </footer>

  <script>
    function createParticle() {
      const p = document.createElement('div'); p.className = 'particle';
      p.style.width = p.style.height = `${Math.random()*4+1}px`;
      p.style.left = `${Math.random()*100}vw`; p.style.top = '100vh';
      p.style.animationDuration = `${20+Math.random()*30}s`;
      document.getElementById('particles').appendChild(p);
      setTimeout(() => p.remove(), 60000);
    }
    setInterval(createParticle, 60);
  </script>
</body>
</html>
