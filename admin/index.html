<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>НейроNova • Админ-панель</title>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    .loader {
      font-size: 32px;
      font-weight: 700;
      color: #c026d3;
      letter-spacing: 3px;
    }
    .status {
      color: #a855f7;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="loader">НЕЙРОNOVA</div>
  <div class="status">Админка загружается... (новый CDN)</div>
  <p style="color:#666; font-size:13px; max-width:300px; text-align:center;">
    Первый запуск может занять до 20 секунд.<br>
    Если висит дольше — нажми Ctrl + Shift + R
  </p>
</body>
</html>
