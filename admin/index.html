<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>НейроNova • Админ-панель</title>
  <script src="https://unpkg.com/decap-cms@3.3.2/dist/decap-cms.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    .loader {
      font-size: 24px;
      font-weight: bold;
      color: #a855f7;
    }
    .loader::after {
      content: " •••";
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0% { content: " •"; }
      33% { content: " ••"; }
      66% { content: " •••"; }
    }
  </style>
</head>
<body>
  <div class="loader">Загрузка админки НейроNova...</div>
  <p style="color:#666; font-size:14px;">Если экран остаётся чёрным больше 10 секунд — нажми Ctrl + Shift + R</p>
</body>
</html>
